<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Mock TonConnect analytics to prevent fetch errors in sandboxed environments
      (function() {
        // 1. Mock Fetch
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
          const url = typeof input === 'string' ? input : (input instanceof Request ? input.url : '');
          if (url && url.includes('analytics.tonconnect.org')) {
            return Promise.resolve(new Response(JSON.stringify({ status: 'ok' }), {
              status: 200,
              statusText: 'OK',
              headers: { 'Content-Type': 'application/json' }
            }));
          }
          return originalFetch.apply(this, arguments);
        };

        // 2. Mock XMLHttpRequest
        const originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
          if (typeof url === 'string' && url.includes('analytics.tonconnect.org')) {
            this.isMocked = true;
          }
          return originalOpen.apply(this, arguments);
        };
        const originalSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.send = function() {
          if (this.isMocked) {
            Object.defineProperty(this, 'readyState', { value: 4 });
            Object.defineProperty(this, 'status', { value: 200 });
            Object.defineProperty(this, 'responseText', { value: JSON.stringify({ status: 'ok' }) });
            if (this.onload) this.onload();
            if (this.onreadystatechange) this.onreadystatechange();
            return;
          }
          return originalSend.apply(this, arguments);
        };

        // 3. Mock sendBeacon
        if (navigator.sendBeacon) {
          const originalSendBeacon = navigator.sendBeacon;
          navigator.sendBeacon = function(url, data) {
            if (typeof url === 'string' && url.includes('analytics.tonconnect.org')) {
              return true;
            }
            return originalSendBeacon.apply(this, arguments);
          };
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
